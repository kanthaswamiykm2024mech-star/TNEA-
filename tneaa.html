<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TNEA Career Architecture Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; font-weight: bold; }
        .domain-btn { background: #3b82f6; color: white; transition: 0.3s; }
        .domain-btn:hover { background: #2563eb; }
        #report { background: #1e293b; padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Architecture Engine</h1>
        <select id="field-select">
            <option value="">-- SELECT ENGINEERING FIELD --</option>
            </select>
        <div id="domain-list"></div>
        <div id="report"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
